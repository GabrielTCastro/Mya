<section id="produtos">
  <h2 class="produtos-titulo">Produtos</h2>

  <div class="produtos-grid" id="produtos-grid">
    <!--
      CARD DE PRODUTO
      Para duplicar: copie este bloco inteiro e altere:
      - data-name: nome do produto (usado na busca)
      - .produto-img: URL da imagem do produto
      - .produto-nome: nome exibido
      - .produto-desc: descrição curta
      - href do botão: link de afiliação
    -->
    <article class="produto-card reveal" data-name="Produto 1">
      <div class="produto-img-wrapper">
        <!-- EDITE AQUI: Substitua o src pela URL da imagem do produto -->
        <img src="" alt="Produto 1" class="produto-img" loading="lazy" decoding="async" width="400" height="225"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="produto-img-placeholder">
          <span>📦</span>
          <span>Imagem do Produto</span>
        </div>
      </div>
      <div class="produto-body">
        <!-- EDITE AQUI: Nome do produto -->
        <h3 class="produto-nome">Produto 1</h3>
        <!-- EDITE AQUI: Descrição curta -->
        <p class="produto-desc">Descrição breve do produto aqui. Máximo 2 linhas.</p>
        <!-- EDITE AQUI: Substitua # pelo link de afiliação -->
        <a href="#" class="produto-btn" data-link="produto-1" target="_blank" rel="noopener noreferrer sponsored">Acessar</a>
      </div>
    </article>
